<div
  class="w-full dark:bg-grey-800 bg-customWhite flex flex-col mx-auto my-auto items-center rounded-lg pt-10 pb-8 relative dark:shadow-lg shadow-none">
  <div class="absolute top-4 right-4">
    <app-theme-switcher-btn></app-theme-switcher-btn>
  </div>

  <!-- explicitly set w-24 and h-24 to lock the exact dimensions -->
  <div class="relative w-24 h-24 mx-auto">

    @if (userData) {
    <!-- Inner skeleton while the actual image downloads -->
    @if (!img.complete) {
    <div class="absolute inset-0 rounded-full bg-gray-200 dark:bg-gray-700 animate-pulse"></div>
    }

    <!-- Actual Image -->
    <img #img (load)="0" [src]="userData.picture.large" [alt]="userData.name.first"
      class="absolute inset-0 rounded-full w-full h-full object-cover transition-opacity duration-300"
      [class.opacity-0]="!img.complete" [class.opacity-100]="img.complete">

    } @else {
    <!-- Main Image Skeleton (No User Data Yet) -->
    <div class="absolute inset-0 rounded-full bg-gray-200 dark:bg-gray-700 animate-pulse"></div>
    }

  </div>

  <div class="user-name mt-8 flex flex-col justify-center">
    @if(userData && userData.name ){
    <h1 class="dark:text-customWhite text-grey-900 leading-tight text-2xl font-inter text-center">
      {{userData.name.first}} {{userData.name.last}}
    </h1>
    } @else {
    <!-- Name Skeleton (h-8 perfectly matches text-2xl line height) -->
    <div class="h-8 w-48 bg-gray-200 dark:bg-gray-700 rounded-md animate-pulse mx-auto"></div>
    }

    @if(userData && userData.location) {
    <p class="text-center dark:text-customGreen text-green-700 font-bold mt-2">
      {{userData.location.city}}, {{userData.location.country}}
    </p>
    } @else {
    <!-- Location Skeleton (mt-2 matches the p tag, h-6 matches standard text height) -->
    <div class="h-6 w-40 bg-gray-200 dark:bg-gray-700 rounded-md animate-pulse mx-auto mt-2"></div>
    }

    <!-- Static Quote -->
    <p class="dark:text-customWhite/75 text-grey-900/75 mt-5 text-center">
      "Front-end developer and avid reader."
    </p>
  </div>

  <ul class="user-socials flex flex-col gap-4 mt-5 w-full px-8">
    <li class="w-full">
      <app-social-btn btnContent="GitHub" btnLink="https://github.com/HosseinHeydarpour"></app-social-btn>
    </li>
    <li class="w-full">
      <app-social-btn btnContent="Frontend Mentor"
        btnLink="https://www.frontendmentor.io/profile/HosseinHeydarpour"></app-social-btn>
    </li>
    <li class="w-full">
      <app-social-btn btnContent="Linkedin" btnLink="https://ir.linkedin.com/in/hosseinheydarpour"></app-social-btn>
    </li>
    <li class="w-full">
      <app-social-btn btnContent="Twitter" btnLink="https://x.com/"></app-social-btn>
    </li>
    <li class="w-full">
      <app-social-btn btnContent="Instagram" btnLink="https://instagram.com/"></app-social-btn>
    </li>
  </ul>

</div>
